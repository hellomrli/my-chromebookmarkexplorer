name: Windows Build

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2019_64"
          cache: true

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt test runtime
        shell: pwsh
        run: |
          windeployqt --release --no-translations --no-compiler-runtime build\Release\HealthCheckerTests.exe
          $redistRoot = Join-Path ${env:ProgramFiles} "Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC"
          $crtDirectory = Get-ChildItem $redistRoot -Directory -Recurse |
            Where-Object { $_.FullName -match "x64[\\/]Microsoft\.VC143\.CRT$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $crtDirectory) {
            throw "MSVC x64 CRT directory was not found under $redistRoot"
          }
          Copy-Item (Join-Path $crtDirectory.FullName "*.dll") build\Release\ -Force
          Get-ChildItem build\Release\*.dll | Select-Object -ExpandProperty Name

      - name: Test
        shell: cmd
        run: build\Release\HealthCheckerTests.exe -v2

      - name: Upload failed test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: HealthCheckerTests-log
          path: health-checker-tests.txt
          if-no-files-found: ignore

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\ChromeBookmarkExplorer | Out-Null
          Copy-Item build\Release\ChromeBookmarkExplorer.exe dist\ChromeBookmarkExplorer\ -Force
          windeployqt --release --no-translations dist\ChromeBookmarkExplorer\ChromeBookmarkExplorer.exe

      - name: Archive
        shell: pwsh
        run: Compress-Archive -Path dist\ChromeBookmarkExplorer\* -DestinationPath ChromeBookmarkExplorer-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChromeBookmarkExplorer-windows-x64
          path: ChromeBookmarkExplorer-windows-x64.zip

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $projectLine = Select-String -Path CMakeLists.txt -Pattern 'project\(ChromeBookmarkExplorer VERSION ([^ ]+)'
          $version = $projectLine.Matches[0].Groups[1].Value
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $tag = "v$version"
          $title = "Chrome Bookmark Explorer v$version"
          $notes = @"
          Automated Windows x64 build.

          Commit: $shortSha
          Workflow run: $env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID
          "@

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --title $title --notes $notes --target $env:GITHUB_SHA
            gh release upload $tag ChromeBookmarkExplorer-windows-x64.zip --clobber
          } else {
            gh release create $tag ChromeBookmarkExplorer-windows-x64.zip --title $title --notes $notes --target $env:GITHUB_SHA --latest
          }
